name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with dev
      - name: Lint
        run: poetry run ruff check astroai/
      - name: Type check
        run: poetry run mypy astroai/
      - name: Test
        run: poetry run pytest tests/unit/ -v

  build-bundle:
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry + PyInstaller
        run: pip install poetry pyinstaller
      - name: Install dependencies
        run: poetry install --without dev
      - name: Bundle
        run: poetry run pyinstaller scripts/astroai.spec
      - uses: actions/upload-artifact@v4
        with:
          name: astroai-${{ matrix.target }}
          path: dist/
