name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry/virtualenvs
            ~/.local/share/pypoetry/virtualenvs
            ~/AppData/Local/pypoetry/Cache/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-
      - name: Install dependencies
        run: poetry install --with dev --sync
      - name: Lint
        run: poetry run ruff check astroai/
      - name: Type check
        run: poetry run mypy astroai/
      - name: Test
        run: poetry run pytest tests/unit/ -v
      - name: Verify ASTAP platform detection
        run: poetry run python -c "from astroai.engine.platesolving.astap_binary import _detect_platform_key; print('Platform:', _detect_platform_key())"

  build-bundle:
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            archive_ext: zip
          - os: ubuntu-latest
            target: linux
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from pyproject.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry/virtualenvs
            ~/.local/share/pypoetry/virtualenvs
            ~/AppData/Local/pypoetry/Cache/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-
      - name: Install dependencies (with PyInstaller)
        run: poetry install --with dev --sync
      - name: Download ASTAP binary
        run: poetry run python scripts/download_astap.py
      - name: Verify ASTAP binary
        run: poetry run python -c "from astroai.engine.platesolving.astap_binary import get_astap_path; print('ASTAP:', get_astap_path())"
      - name: Bundle with PyInstaller
        run: poetry run pyinstaller scripts/astroai.spec --noconfirm
      - name: Package artifact (Windows)
        if: matrix.target == 'win'
        shell: pwsh
        run: Compress-Archive -Path dist/AstroAI -DestinationPath "astroai-${{ steps.version.outputs.version }}-win.zip"
      - name: Package artifact (Linux)
        if: matrix.target == 'linux'
        run: tar -czf "astroai-${{ steps.version.outputs.version }}-linux.tar.gz" -C dist AstroAI
      - uses: actions/upload-artifact@v4
        with:
          name: astroai-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: astroai-${{ steps.version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}
