name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            archive_ext: zip
          - os: ubuntu-latest
            target: linux
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Install Poetry
        run: pip install poetry
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry/virtualenvs
            ~/.local/share/pypoetry/virtualenvs
            ~/AppData/Local/pypoetry/Cache/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-
      - name: Install dependencies
        run: poetry install --with dev --sync
      - name: Bundle with PyInstaller
        run: poetry run pyinstaller scripts/astroai.spec --noconfirm
      - name: Package artifact (Windows)
        if: matrix.target == 'win'
        shell: pwsh
        run: Compress-Archive -Path dist/AstroAI -DestinationPath "astroai-${{ env.VERSION }}-win.zip"
      - name: Package artifact (Linux)
        if: matrix.target == 'linux'
        run: tar -czf "astroai-${{ env.VERSION }}-linux.tar.gz" -C dist AstroAI
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body: |
            ## AstroAI Suite v${{ env.VERSION }}

            ### Neue Features seit v0.1.0-alpha

            - **E3** Background-Extraktion — Gradient-Removal & Pipeline-Integration
            - **E4+E1** Projekt-Persistenz, TIFF I/O, XISF-Write, Export-Step, LogWidget
            - **E4** LRGB/Narrowband Multi-Kanal-Workflow — ChannelCombiner, NarrowbandMapper
            - **E5** Starless — StarRemovalStep, StarlessPanel
            - **E6** Deconvolution, DenoiseStep, StretchStep
            - Cloudflare Workers Licensing API
            - Security Hardening S-01 bis S-04

            ### Breaking Changes
            Keine.

            ### Installation
            Lade das passende Artifact für dein Betriebssystem herunter und entpacke es.
          files: astroai-${{ env.VERSION }}-${{ matrix.target }}.${{ matrix.archive_ext }}
