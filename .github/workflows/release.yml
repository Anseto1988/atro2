name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body: |
            ## AstroAI Suite v${{ steps.version.outputs.version }}

            ### Neue Features seit v1.1.0-alpha

            - **F-1** ASTAP Plate Solving — Engine, Pipeline Step, Sky Overlay, AI-Koordinaten-Extraktion + Sky-Atlas
            - **F-2** GPU-Kalibrierung — GPUCalibrationEngine (CUDA/MPS/CPU-Fallback), CalibrationBenchmarkWidget
            - **F-3** Drizzle Super-Resolution — Sub-Pixel-Upscaling (reproject-basiert), Drop-Size/Pixfrac konfigurierbar
            - **F-4** Mosaic-Workflow — WCS-basiertes Multi-Panel-Stitching, Gradientenkorrektur, blend modes
            - **F-5** Photometrische Farbkalibrierung — GAIA DR3 + 2MASS Sternkatalog, Apertur-Photometrie, Sigma-Clipping, SPCC-äquivalent

            ### Alle Features

            - **E3** Background-Extraktion — Gradient-Removal & Pipeline-Integration
            - **E4+E1** Projekt-Persistenz, TIFF I/O, XISF-Write, Export-Step, LogWidget
            - **E4** LRGB/Narrowband Multi-Kanal-Workflow — ChannelCombiner, NarrowbandMapper
            - **E5** Starless — StarRemovalStep, StarlessPanel
            - **E6** Deconvolution, DenoiseStep, StretchStep
            - **F-1** ASTAP Plate Solving + Sky Overlay
            - **F-2** GPU-Kalibrierung (CUDA/MPS/CPU)
            - **F-3** Drizzle Super-Resolution (reproject-basiert)
            - **F-4** Mosaic-Workflow (MosaicStep + MosaicPanel)
            - **F-5** Photometrische Farbkalibrierung (SpectralColorCalibrator + GAIA DR3)
            - Cloudflare Workers Licensing API
            - Security Hardening S-01 bis S-04

            ### Breaking Changes
            Keine.

            ### Installation
            Lade das passende Artifact für dein Betriebssystem herunter und entpacke es.

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            archive_ext: zip
          - os: ubuntu-latest
            target: linux
            archive_ext: tar.gz
          - os: macos-latest
            target: macos
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Install Poetry
        run: pip install poetry
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry/virtualenvs
            ~/.local/share/pypoetry/virtualenvs
            ~/AppData/Local/pypoetry/Cache/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-
      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "win" ]; then
            poetry install --with dev --extras secure-keystore --no-interaction
          else
            poetry install --with dev --no-interaction
          fi
      - name: Install CPU-only PyTorch (smaller bundle)
        shell: bash
        run: poetry run pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu --force-reinstall --no-deps
      - name: Download ASTAP binary
        continue-on-error: true
        run: poetry run python scripts/download_astap.py
      - name: Verify ASTAP binary
        continue-on-error: true
        run: poetry run python -c "from astroai.engine.platesolving.astap_binary import get_astap_path; print('ASTAP:', get_astap_path())"
      - name: Ensure bin directory exists
        shell: bash
        run: mkdir -p astroai/engine/platesolving/bin
      - name: Bundle with PyInstaller
        run: poetry run pyinstaller scripts/astroai.spec --noconfirm
      - name: Package artifact (Windows)
        if: matrix.target == 'win'
        shell: pwsh
        run: Compress-Archive -Path dist/AstroAI -DestinationPath "astroai-${{ env.VERSION }}-win.zip"
      - name: Package artifact (Linux)
        if: matrix.target == 'linux'
        run: tar -czf "astroai-${{ env.VERSION }}-linux.tar.gz" -C dist AstroAI
      - name: Package artifact (macOS)
        if: matrix.target == 'macos'
        run: tar -czf "astroai-${{ env.VERSION }}-macos.tar.gz" -C dist AstroAI.app
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: astroai-${{ env.VERSION }}-${{ matrix.target }}.${{ matrix.archive_ext }}
