name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            archive_ext: zip
          - os: ubuntu-latest
            target: linux
            archive_ext: tar.gz
          - os: macos-latest
            target: macos
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    env:
      VERSION: "0.1.0-alpha"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with dev
      - name: Bundle with PyInstaller
        run: poetry run pyinstaller scripts/astroai.spec --noconfirm
      - name: Package artifact (Windows)
        if: matrix.target == 'win'
        shell: pwsh
        run: Compress-Archive -Path dist/AstroAI -DestinationPath "astroai-${{ env.VERSION }}-win.zip"
      - name: Package artifact (Linux)
        if: matrix.target == 'linux'
        run: tar -czf "astroai-${{ env.VERSION }}-linux.tar.gz" -C dist AstroAI
      - name: Package artifact (macOS)
        if: matrix.target == 'macos'
        run: tar -czf "astroai-${{ env.VERSION }}-macos.tar.gz" -C dist AstroAI.app
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: astroai-${{ env.VERSION }}-${{ matrix.target }}.${{ matrix.archive_ext }}
